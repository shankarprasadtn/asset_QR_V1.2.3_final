<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reset Password · Asset QR Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0; min-height: 100vh; background: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb; padding: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #020617; border-radius: 16px;
      border: 1px solid rgba(148,163,184,0.25);
      padding: 20px 22px 22px; max-width: 420px; width: 100%;
      box-shadow: 0 18px 40px rgba(15,23,42,0.95), 0 0 0 1px rgba(15,23,42,1);
    }
    h1 {
      font-size: 1.05rem; margin: 0 0 6px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .subtitle { font-size: 0.8rem; color: #9ca3af; margin-bottom: 14px; }
    label {
      font-size: 0.8rem; color: #9ca3af;
      display: block; margin-top: 8px; margin-bottom: 3px;
    }
    input {
      width: 100%; padding: 8px 10px; border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.45);
      background: #020617; color: #e5e7eb; outline: none;
    }
    button {
      margin-top: 12px; padding: 8px 12px; border-radius: 999px; border: none;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white; font-size: 0.85rem; text-transform: uppercase;
      letter-spacing: 0.05em; cursor: pointer; width: 100%;
    }
    .message { margin-top: 10px; font-size: 0.8rem; color: #22c55e; }
    .back-link { margin-top: 12px; font-size: 0.8rem; }
    .back-link a { color: #93c5fd; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    <div class="subtitle">
      Admin can reset any user's password by confirming the admin password.
    </div>

    <form method="POST">
      <label for="admin_password">Admin Password</label>
      <input id="admin_password" name="admin_password" type="password" required>

      <label for="username">Target Username</label>
      <input id="username" name="username" placeholder="e.g. user1" required>

      <label for="new_password">New Password</label>
      <input id="new_password" name="new_password" type="password" required>

      <button type="submit">Reset Password</button>
    </form>

    {% if message %}
      <div class="message">{{ message }}</div>
    {% endif %}

    <div class="back-link">
      <a href="{{ url_for('manage_users') }}">← Back to Manage Users</a>
    </div>
  </div>
</body>
</html>
