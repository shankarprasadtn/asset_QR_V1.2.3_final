<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login · Asset QR Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
    }
    .card {
      background: #020617; border-radius: 16px;
      border: 1px solid rgba(148,163,184,0.25);
      padding: 20px 22px 24px; width: 100%; max-width: 360px;
      box-shadow: 0 18px 40px rgba(15,23,42,0.95), 0 0 0 1px rgba(15,23,42,1);
    }
    h1 {
      font-size: 1.1rem; margin: 0 0 8px;
      text-transform: uppercase; letter-spacing: 0.09em;
    }
    .subtitle { font-size: 0.8rem; color: #9ca3af; margin-bottom: 18px; }
    label {
      font-size: 0.8rem; color: #9ca3af; display: block; margin-bottom: 4px;
    }
    input {
      width: 100%; padding: 8px 10px; margin-bottom: 10px;
      border-radius: 10px; border: 1px solid rgba(148,163,184,0.45);
      background: #020617; color: #e5e7eb; outline: none;
    }
    button {
      width: 100%; padding: 9px 12px; border-radius: 999px; border: none;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase; cursor: pointer; font-size: 0.9rem; margin-top: 4px;
    }
    .message { margin-top: 10px; font-size: 0.8rem; color: #f97373; }
    .hint { margin-top: 12px; font-size: 0.75rem; color: #9ca3af; }
    .hint code {
      background: rgba(15,23,42,0.9); padding: 2px 4px; border-radius: 4px;
      border: 1px solid rgba(148,163,184,0.2); font-size: 0.7rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Asset QR Login</h1>
    <div class="subtitle">Sign in to use the QR generator.</div>

    <form method="POST">
      <label for="username">Username</label>
      <input id="username" name="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>

      <button type="submit">Sign in</button>
    </form>

    {% if message %}
      <div class="message">{{ message }}</div>
    {% endif %}

     <div class="hint">
      Default accounts (change via <code>users.json</code> or Manage Users):<br>
      <code>admin / Admin@123</code> (admin)<br>
      <code>user / User@123</code> (user)
    </div>

  </div>
</body>
</html>
